spring.application.name=smart-pantry
server.port=${SERVER_PORT:8080}

# Marketplace service boundaries
marketplace.mg.enabled=${MARKETPLACE_MG_ENABLED:true}
marketplace.ys.enabled=${MARKETPLACE_YS_ENABLED:true}

# Datasource
# Provide DB_URL, DB_USERNAME, and DB_PASSWORD via environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smartpantry}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Daily product details schedulers by marketplace
daily.product.details.scheduler.migros.enabled=${DAILY_PRODUCT_DETAILS_SCHEDULER_MIGROS_ENABLED:true}
daily.product.details.scheduler.migros.fixed-delay=${DAILY_PRODUCT_DETAILS_SCHEDULER_MIGROS_FIXED_DELAY:PT1H}
daily.product.details.scheduler.migros.initial-delay=${DAILY_PRODUCT_DETAILS_SCHEDULER_MIGROS_INITIAL_DELAY:PT0S}
daily.product.details.scheduler.yemeksepeti.enabled=${DAILY_PRODUCT_DETAILS_SCHEDULER_YEMEKSEPETI_ENABLED:true}
daily.product.details.scheduler.yemeksepeti.fixed-delay=${DAILY_PRODUCT_DETAILS_SCHEDULER_YEMEKSEPETI_FIXED_DELAY:PT1H}
daily.product.details.scheduler.yemeksepeti.initial-delay=${DAILY_PRODUCT_DETAILS_SCHEDULER_YEMEKSEPETI_INITIAL_DELAY:PT10M}

# Marketplace catalog sync schedulers (candidate preload into DB)
catalog.sync.scheduler.migros.enabled=${CATALOG_SYNC_SCHEDULER_MIGROS_ENABLED:true}
catalog.sync.scheduler.migros.fixed-delay=${CATALOG_SYNC_SCHEDULER_MIGROS_FIXED_DELAY:PT2H}
catalog.sync.scheduler.migros.initial-delay=${CATALOG_SYNC_SCHEDULER_MIGROS_INITIAL_DELAY:PT1M}
catalog.sync.scheduler.yemeksepeti.enabled=${CATALOG_SYNC_SCHEDULER_YEMEKSEPETI_ENABLED:true}
catalog.sync.scheduler.yemeksepeti.fixed-delay=${CATALOG_SYNC_SCHEDULER_YEMEKSEPETI_FIXED_DELAY:PT2H}
catalog.sync.scheduler.yemeksepeti.initial-delay=${CATALOG_SYNC_SCHEDULER_YEMEKSEPETI_INITIAL_DELAY:PT6M}

# Marketplace URLs
marketplace.urls.yemeksepeti-base=${YEMEKSEPETI_BASE_URL}
marketplace.urls.migros-prefix=${MIGROS_PREFIX_URL}
marketplace.urls.migros-suffix=${MIGROS_SUFFIX_URL}

# Basket minimum order amounts
basket.minimum.ys=${BASKET_MINIMUM_YS:0}
basket.minimum.mg=${BASKET_MINIMUM_MG:0}

# Migros dynamic basket settings
migros.cart.url=${MIGROS_CART_URL:https://www.migros.com.tr/rest/carts/screens/V2?reid=1771310814233000001}
migros.cart.store-id-url=${MIGROS_CART_STORE_ID_URL:https://www.migros.com.tr/rest/carts?isCartPage=false}
migros.cart.cookie=${MIGROS_CART_COOKIE:}
migros.cart.referer=${MIGROS_CART_REFERER:https://www.migros.com.tr/sepetim}
migros.cart.header.forwarded-rest=${MIGROS_CART_HEADER_FORWARDED_REST:true}
migros.cart.header.pwa=${MIGROS_CART_HEADER_PWA:true}
migros.cart.header.device-pwa=${MIGROS_CART_HEADER_DEVICE_PWA:true}

# Migros store id resolution by location
migros.locations.base-url=${MIGROS_LOCATIONS_BASE_URL:https://www.migros.com.tr/rest/delivery-bff/locations}
migros.delivery.url=${MIGROS_DELIVERY_URL:https://www.migros.com.tr/rest/delivery-bff/v2/delivery-addresses}
migros.delivery.checkout-lookup-url=${MIGROS_DELIVERY_CHECKOUT_LOOKUP_URL:https://www.migros.com.tr/rest/delivery-bff/delivery-addresses/checkouts}
migros.delivery.cookie=${MIGROS_DELIVERY_COOKIE:${migros.cart.cookie}}
migros.delivery.referer=${MIGROS_DELIVERY_REFERER:https://www.migros.com.tr/}
migros.delivery.header.forwarded-rest=${MIGROS_DELIVERY_HEADER_FORWARDED_REST:true}
migros.delivery.header.pwa=${MIGROS_DELIVERY_HEADER_PWA:true}
migros.delivery.header.device-pwa=${MIGROS_DELIVERY_HEADER_DEVICE_PWA:true}
migros.store-id-cache.enabled=${MIGROS_STORE_ID_CACHE_ENABLED:true}
migros.store-id-cache.ttl=${MIGROS_STORE_ID_CACHE_TTL:PT24H}
migros.store-id-cache.coordinate-scale=${MIGROS_STORE_ID_CACHE_COORDINATE_SCALE:6}

# Migros selenium cookie refresh
migros.cookie.refresh.selenium.enabled=${MIGROS_COOKIE_REFRESH_SELENIUM_ENABLED:false}
migros.cookie.refresh.selenium.url=${MIGROS_COOKIE_REFRESH_SELENIUM_URL:https://www.migros.com.tr/}
migros.cookie.refresh.selenium.user-agent=${MIGROS_COOKIE_REFRESH_SELENIUM_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36}
migros.cookie.refresh.selenium.wait-ms=${MIGROS_COOKIE_REFRESH_SELENIUM_WAIT_MS:2500}
migros.cookie.refresh.scheduler.enabled=${MIGROS_COOKIE_REFRESH_SCHEDULER_ENABLED:false}
migros.cookie.refresh.scheduler.fixed-delay=${MIGROS_COOKIE_REFRESH_SCHEDULER_FIXED_DELAY:PT30M}
migros.cookie.refresh.scheduler.initial-delay=${MIGROS_COOKIE_REFRESH_SCHEDULER_INITIAL_DELAY:PT2M}

# Yemeksepeti reverse geocoder
yemeksepeti.geocoder.reverse-url=${YEMEKSEPETI_GEOCODER_REVERSE_URL:https://geocoder.deliveryhero.io/api/v2/reverse}
yemeksepeti.geocoder.language=${YEMEKSEPETI_GEOCODER_LANGUAGE:tr_TR}
yemeksepeti.geocoder.accept-language=${YEMEKSEPETI_GEOCODER_ACCEPT_LANGUAGE:tr,en;q=0.9,en-US;q=0.8}
yemeksepeti.geocoder.authorization=${YEMEKSEPETI_GEOCODER_AUTHORIZATION:}
yemeksepeti.geocoder.cust-code=${YEMEKSEPETI_GEOCODER_CUST_CODE:}
yemeksepeti.geocoder.perseus-client-id=${YEMEKSEPETI_GEOCODER_PERSEUS_CLIENT_ID:}
yemeksepeti.geocoder.perseus-session-id=${YEMEKSEPETI_GEOCODER_PERSEUS_SESSION_ID:}
yemeksepeti.geocoder.origin=${YEMEKSEPETI_GEOCODER_ORIGIN:https://www.yemeksepeti.com}
yemeksepeti.geocoder.referer=${YEMEKSEPETI_GEOCODER_REFERER:https://www.yemeksepeti.com/}
yemeksepeti.geocoder.user-agent=${YEMEKSEPETI_GEOCODER_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36}
yemeksepeti.geocoder.x-caller-country=${YEMEKSEPETI_GEOCODER_X_CALLER_COUNTRY:tr}
yemeksepeti.geocoder.x-caller-platform=${YEMEKSEPETI_GEOCODER_X_CALLER_PLATFORM:b2c}
yemeksepeti.geocoder.x-global-entity-id=${YEMEKSEPETI_GEOCODER_X_GLOBAL_ENTITY_ID:YS_TR}
yemeksepeti.geocoder.x-pd-language-id=${YEMEKSEPETI_GEOCODER_X_PD_LANGUAGE_ID:2}

# Yemeksepeti vendor resolver (lat/lng -> vendor code)
yemeksepeti.vendor-resolver.url=${YEMEKSEPETI_VENDOR_RESOLVER_URL:https://tr.fd-api.com/vendors-gateway/api/v1/pandora/vendors}
yemeksepeti.vendor-resolver.chain-code=${YEMEKSEPETI_VENDOR_RESOLVER_CHAIN_CODE:ct4lp}
yemeksepeti.vendor-resolver.country=${YEMEKSEPETI_VENDOR_RESOLVER_COUNTRY:tr}
yemeksepeti.vendor-resolver.customer-type=${YEMEKSEPETI_VENDOR_RESOLVER_CUSTOMER_TYPE:regular}
yemeksepeti.vendor-resolver.accept-language=${YEMEKSEPETI_VENDOR_RESOLVER_ACCEPT_LANGUAGE:tr-TR,tr;q=0.9,en-US;q=0.8,en;q=0.7}
yemeksepeti.vendor-resolver.referer=${YEMEKSEPETI_VENDOR_RESOLVER_REFERER:https://www.yemeksepeti.com/}
yemeksepeti.vendor-resolver.perseus-client-id=${YEMEKSEPETI_VENDOR_RESOLVER_PERSEUS_CLIENT_ID:}
yemeksepeti.vendor-resolver.perseus-session-id=${YEMEKSEPETI_VENDOR_RESOLVER_PERSEUS_SESSION_ID:}
yemeksepeti.vendor-resolver.x-pd-language-id=${YEMEKSEPETI_VENDOR_RESOLVER_X_PD_LANGUAGE_ID:2}
yemeksepeti.vendor-resolver.x-fp-api-key=${YEMEKSEPETI_VENDOR_RESOLVER_X_FP_API_KEY:}
yemeksepeti.vendor-resolver.x-disco-client-id=${YEMEKSEPETI_VENDOR_RESOLVER_X_DISCO_CLIENT_ID:}
yemeksepeti.vendor-resolver.origin=${YEMEKSEPETI_VENDOR_RESOLVER_ORIGIN:https://www.yemeksepeti.com}
yemeksepeti.vendor-resolver.user-agent=${YEMEKSEPETI_VENDOR_RESOLVER_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:147.0) Gecko/20100101 Firefox/147.0}

# Settings API guard
settings.api-key=${SETTINGS_API_KEY:}

# JWT security
security.jwt.enabled=${SECURITY_JWT_ENABLED:false}
security.jwt.secret=${SECURITY_JWT_SECRET:}
security.jwt.ttl=${SECURITY_JWT_TTL:PT8H}
security.jwt.admin.username=${SECURITY_JWT_ADMIN_USERNAME:admin}
security.jwt.admin.password=${SECURITY_JWT_ADMIN_PASSWORD:}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://192.168.*:3000,http://10.*.*.*:3000,http://172.16.*.*:3000,http://172.17.*.*:3000,http://172.18.*.*:3000,http://172.19.*.*:3000,http://172.2*.*.*:3000,http://172.30.*.*:3000,http://172.31.*.*:3000}

# Observability
management.endpoints.web.exposure.include=${MANAGEMENT_EXPOSED_ENDPOINTS:health,info,prometheus}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_ENABLED:true}
