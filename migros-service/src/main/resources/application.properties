spring.profiles.include=common
server.port=${SERVER_PORT:8081}
spring.application.name=smart-pantry-migros-service
marketplace.mg.enabled=true
marketplace.ys.enabled=false

daily.product.details.scheduler.migros.enabled=true
daily.product.details.scheduler.yemeksepeti.enabled=false

docs.title=Smart Pantry - Migros Service API
docs.description=Only Migros microservice endpoints
docs.servers=http://localhost:8080/mg|Gateway Migros;http://localhost:8080/ys|Gateway Yemeksepeti
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
