name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw
      - name: Backend tests
        run: ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          PROJECT_KEY="${SONAR_PROJECT_KEY:-${GITHUB_REPOSITORY/\//_}}"
          ORGANIZATION="${SONAR_ORGANIZATION:-${GITHUB_REPOSITORY_OWNER}}"
          ./mvnw -B -DskipTests verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.organization="${ORGANIZATION}" \
            -Dsonar.projectKey="${PROJECT_KEY}"
      - name: SonarCloud Skip (No Token)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not set. Skipping SonarCloud scan."
