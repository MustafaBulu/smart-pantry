services:
  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile.discovery
    container_name: smart-pantry-discovery-server
    ports:
      - "8761:8761"

  db:
    image: postgres:16-alpine
    container_name: smart-pantry-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init-microservices.sql:/docker-entrypoint-initdb.d/init-microservices.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migros-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-pantry-migros-service
    env_file:
      - .env
    environment:
      APP_MODULE: migros-service
      SPRING_PROFILES_ACTIVE: mg
      DB_URL: jdbc:postgresql://db:5432/smart_pantry_mg
      DB_USERNAME: postgres
      DB_PASSWORD: root
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      SPRINGDOC_SWAGGER_UI_CONFIG_URL: /mg/v3/api-docs/swagger-config
      SPRINGDOC_SWAGGER_UI_URL: /mg/v3/api-docs
    depends_on:
      db:
        condition: service_healthy
      discovery-server:
        condition: service_started
    ports:
      - "8081:8081"

  yemeksepeti-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-pantry-yemeksepeti-service
    env_file:
      - .env
    environment:
      APP_MODULE: yemeksepeti-service
      SPRING_PROFILES_ACTIVE: ys
      DB_URL: jdbc:postgresql://db:5432/smart_pantry_ys
      DB_USERNAME: postgres
      DB_PASSWORD: root
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      SPRINGDOC_SWAGGER_UI_CONFIG_URL: /ys/v3/api-docs/swagger-config
      SPRINGDOC_SWAGGER_UI_URL: /ys/v3/api-docs
    depends_on:
      db:
        condition: service_healthy
      discovery-server:
        condition: service_started
    ports:
      - "8082:8082"

  api-gateway:
    image: nginx:1.27-alpine
    container_name: smart-pantry-api-gateway
    depends_on:
      - migros-service
      - yemeksepeti-service
    volumes:
      - ./scripts/gateway/nginx.microservices.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-pantry-frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8080
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"

volumes:
  postgres_data:
