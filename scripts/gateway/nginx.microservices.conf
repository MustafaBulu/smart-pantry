server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Settings-Api-Key, X-User-City, X-User-District, X-User-Latitude, X-User-Longitude" always;
    add_header Access-Control-Max-Age "86400" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /swagger-ui/index.html {
        return 302 /ys/swagger-ui/index.html;
    }

    location = /swagger-ui/ {
        return 302 /ys/swagger-ui/index.html;
    }

    location /mg/ {
        set $mg_upstream http://migros-service:8081;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;
        rewrite ^/mg/(.*)$ /$1 break;
        proxy_pass $mg_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ys/ {
        set $ys_upstream http://yemeksepeti-service:8082;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;
        rewrite ^/ys/(.*)$ /$1 break;
        proxy_pass $ys_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Common API endpoints are served by the smart-pantry app instance.
    location ~ ^/(categories|needs|products|settings|marketplaces|auth|actuator|v3) {
        set $common_upstream http://migros-service:8081;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_pass $common_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
