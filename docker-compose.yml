services:
  db:
    image: postgres:16-alpine
    container_name: smart-pantry-db
    environment:
      POSTGRES_DB: smart_pantry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_pantry"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-pantry-backend
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/smart_pantry
      DB_USERNAME: postgres
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-pantry-frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8081
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
